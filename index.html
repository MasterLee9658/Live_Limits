<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninjacart Financial Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f1f5f9;
            margin: 0;
            overflow-x: hidden;
        }

        .nebula-pulse { 
            animation: pulse 20s ease-in-out infinite; 
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            50% { transform: scale(1.1) translate(-2%, -2%); opacity: 0.5; }
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .neon-text {
            color: #10b981;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.7), 0 0 20px rgba(16, 185, 129, 0.4);
        }

        /* Custom Scrollbar for Terminal Look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const motion = window.Motion?.motion || window.FramerMotion?.motion || { div: 'div' };
        const AnimatePresence = window.Motion?.AnimatePresence || window.FramerMotion?.AnimatePresence || (({children}) => children);

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQuV21M4OXkPPkTO3dGjp_0dxxnWJObLs4DbhIWt2q-Wi9mI593a6iZ8CJNtoaInLMmx5ZvKV4DWhIL/pub?gid=0&single=true&output=csv";
        const ACCESS_PASSWORD = "ninja@123";

        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                Hash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></svg>,
                Phone: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
                User: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                CreditCard: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
                Activity: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
                AlertCircle: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>,
                ShieldAlert: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>,
                RefreshCw: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>,
                Lock: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
                LogOut: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
                ArrowRight: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
                CheckCircle2: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>,
                Search: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>
            };
            return icons[name] || null;
        };

        const DataRow = ({ label, value, icon, isLimit, isDanger, isSuccess }) => (
            <div className="flex items-center px-6 py-4 hover:bg-white/5 transition-all group border-b border-white/5 last:border-0">
                <div className="w-1/3 flex items-center gap-3">
                    <span className="text-slate-500 group-hover:text-emerald-400 transition-colors">{icon}</span>
                    <span className="text-[9px] font-black uppercase tracking-widest text-slate-500">{label}</span>
                </div>
                <div className="flex-1">
                    <div className={`text-sm font-bold tracking-tight ${
                        isLimit ? 'text-emerald-400 drop-shadow-[0_0_8px_rgba(16,185,129,0.3)]' : 
                        isDanger ? 'text-rose-400 uppercase drop-shadow-[0_0_8px_rgba(244,63,94,0.3)]' : 
                        isSuccess ? 'text-emerald-400 uppercase' :
                        'text-slate-100'
                    }`}>
                        {value}
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [phoneSearch, setPhoneSearch] = useState('');
            const [idSearch, setIdSearch] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === ACCESS_PASSWORD) {
                    setIsAuthenticated(true);
                    setLoginError(false);
                    fetchData();
                } else {
                    setLoginError(true);
                    setTimeout(() => setLoginError(false), 2000);
                }
            };

            const fetchData = async () => {
                try {
                    setLoading(true);
                    const response = await fetch(CSV_URL);
                    const csvText = await response.text();
                    const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== '');
                    const parsed = lines.slice(1).map(line => {
                        const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, ''));
                        return {
                            auId: cols[1] || 'N/A',
                            name: cols[2] || 'Unknown',
                            phone: cols[3] || '',
                            bnplLimit: parseFloat(cols[4]) || 0,
                            fungibleLimit: parseFloat(cols[5]) || 0,
                            dpd: parseInt(cols[6]) || 0,
                            activeDpdLoans: parseInt(cols[7]) || 0
                        };
                    });
                    setData(parsed);
                } catch (err) {
                    console.error("Fetch failed", err);
                } finally {
                    setLoading(false);
                }
            };

            const filteredData = useMemo(() => {
                const p = phoneSearch.trim();
                const id = idSearch.trim().toLowerCase();
                if (!p && !id) return [];
                return data.filter(item => 
                    (p === '' || item.phone.toString().includes(p)) &&
                    (id === '' || item.auId.toLowerCase().includes(id))
                );
            }, [data, phoneSearch, idSearch]);

            return (
                <div className="min-h-screen flex flex-col relative overflow-hidden">
                    <div className="fixed inset-0 pointer-events-none z-0">
                        <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&q=80&w=2000')] bg-cover bg-center opacity-30 nebula-pulse" style={{ mixBlendMode: 'screen' }}></div>
                        <div className="absolute top-[-20%] left-[-10%] w-[80%] h-[80%] bg-purple-900/20 blur-[150px] rounded-full"></div>
                        <div className="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] bg-emerald-900/10 blur-[150px] rounded-full"></div>
                        <div className="absolute inset-0 bg-slate-950/40"></div>
                    </div>

                    <AnimatePresence mode="wait">
                        {!isAuthenticated ? (
                            <motion.div key="login" initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 1.05 }} className="flex-1 flex items-center justify-center p-6 z-10">
                                <div className="w-full max-w-md glass-panel p-10 rounded-[2.5rem] text-center">
                                    <div className="mb-8 flex justify-center items-center gap-3">
                                        <img src="image_7fa731.png" className="h-10" />
                                        <div className="h-8 w-px bg-white/10 mx-1"></div>
                                        <span className="text-xl font-black tracking-tighter italic text-white">NINJACART</span>
                                    </div>
                                    <h2 className="text-xs font-black tracking-[0.3em] uppercase text-emerald-400 mb-8">Financial Gateway</h2>
                                    <form onSubmit={handleLogin} className="space-y-4">
                                        <div className="relative group">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2"><Icon name="Lock" className={loginError ? 'text-rose-500' : 'text-slate-500'} /></div>
                                            <input 
                                                type="password"
                                                placeholder="ACCESS KEY"
                                                className={`w-full pl-12 pr-4 py-4 bg-slate-950/50 border rounded-2xl text-center text-sm font-black tracking-[0.3em] focus:outline-none transition-all ${loginError ? 'border-rose-500 text-rose-500' : 'border-white/10 text-white focus:border-emerald-500/50'}`}
                                                value={passwordInput}
                                                onChange={(e) => setPasswordInput(e.target.value)}
                                            />
                                        </div>
                                        <button type="submit" className="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-slate-950 rounded-2xl font-black uppercase tracking-widest text-[10px] flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all">
                                            Verify Authorization <Icon name="ArrowRight" />
                                        </button>
                                    </form>
                                </div>
                            </motion.div>
                        ) : (
                            <motion.div key="dashboard" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex-1 relative z-10 max-w-4xl mx-auto w-full p-4 md:p-8">
                                <header className="flex items-center justify-between mb-10">
                                    <div className="flex items-center gap-4">
                                        <img src="image_7fa731.png" className="h-10 drop-shadow-[0_0_10px_rgba(16,185,129,0.5)]" />
                                        <div className="hidden md:block">
                                            <h1 className="text-lg font-black tracking-tighter text-white uppercase italic">Terminal</h1>
                                            <p className="text-[8px] font-bold text-emerald-500/80 tracking-[0.2em] uppercase">Status: Live Node</p>
                                        </div>
                                    </div>

                                    {/* Centered Large Neon Header */}
                                    <div className="absolute left-1/2 -translate-x-1/2 hidden md:block">
                                        <div className="flex flex-col items-center">
                                            <h2 className="text-xl font-black tracking-[0.4em] neon-text uppercase italic">
                                                LIVE_LIMIT
                                            </h2>
                                            <div className="w-24 h-0.5 bg-emerald-500/50 rounded-full mt-1 blur-[1px]"></div>
                                        </div>
                                    </div>

                                    <div className="flex gap-2">
                                        <button onClick={fetchData} className="p-2 px-4 bg-white/5 hover:bg-white/10 text-emerald-400 rounded-xl border border-white/5 flex items-center gap-2 font-black text-[9px] transition-all">
                                            <Icon name="RefreshCw" className={loading ? "animate-spin" : ""} /> {loading ? "SYNC" : "REFRESH"}
                                        </button>
                                        <button onClick={() => setIsAuthenticated(false)} className="p-2 px-4 bg-rose-500/10 text-rose-400 hover:bg-rose-500/20 rounded-xl border border-rose-500/20 flex items-center gap-2 font-black text-[9px] transition-all">
                                            <Icon name="LogOut" /> DISCONNECT
                                        </button>
                                    </div>
                                </header>

                                {/* Mobile Centered Header */}
                                <div className="md:hidden flex flex-col items-center mb-6">
                                    <h2 className="text-lg font-black tracking-[0.3em] neon-text uppercase italic">
                                        LIVE_LIMIT
                                    </h2>
                                    <div className="w-16 h-0.5 bg-emerald-500/50 rounded-full mt-1 blur-[1px]"></div>
                                </div>

                                <div className="space-y-6">
                                    <div className="glass-panel p-5 rounded-3xl grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="relative group">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-emerald-400 transition-colors"><Icon name="Phone" /></div>
                                            <input type="text" placeholder="MOBILE_NUM" className="w-full pl-12 pr-4 py-4 bg-slate-950/40 border border-white/5 rounded-2xl text-xs font-bold tracking-widest text-white focus:outline-none focus:border-emerald-500/30 transition-all uppercase" value={phoneSearch} onChange={(e) => setPhoneSearch(e.target.value)} />
                                        </div>
                                        <div className="relative group">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-emerald-400 transition-colors"><Icon name="Hash" /></div>
                                            <input type="text" placeholder="AU_ID" className="w-full pl-12 pr-4 py-4 bg-slate-950/40 border border-white/5 rounded-2xl text-xs font-bold tracking-widest text-white focus:outline-none focus:border-emerald-500/30 transition-all uppercase" value={idSearch} onChange={(e) => setIdSearch(e.target.value)} />
                                        </div>
                                    </div>

                                    <div className="space-y-4 pb-20">
                                        {filteredData.length > 0 ? (
                                            filteredData.map((row, idx) => {
                                                const hasDpd = row.dpd > 0 || row.activeDpdLoans > 0;
                                                return (
                                                    <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: idx * 0.05 }} key={idx} className="glass-panel rounded-3xl overflow-hidden shadow-2xl">
                                                        <div className="bg-emerald-500/10 px-6 py-3 flex justify-between items-center border-b border-white/5">
                                                            <div className="flex items-center gap-2">
                                                                <div className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                                                                <span className="text-[10px] font-black uppercase tracking-widest text-emerald-400">System Record // {row.auId}</span>
                                                            </div>
                                                            <div className={`px-3 py-1 rounded-lg text-[9px] font-black uppercase flex items-center gap-1.5 ${hasDpd ? 'bg-rose-500/20 text-rose-400 border border-rose-500/30' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'}`}>
                                                                <Icon name={hasDpd ? "AlertCircle" : "CheckCircle2"} size={10} /> {hasDpd ? "DPD DETECTED" : "VERIFIED CLEAR"}
                                                            </div>
                                                        </div>
                                                        <div className="bg-slate-950/20">
                                                            <DataRow label="Legal Name" value={row.name} icon={<Icon name="User" />} />
                                                            <DataRow label="Phone Link" value={row.phone} icon={<Icon name="Phone" />} />
                                                            <DataRow label="BNPL Allocation" value={`₹${row.bnplLimit.toLocaleString()}`} icon={<Icon name="CreditCard" />} isLimit />
                                                            <DataRow label="Fungible Credits" value={`₹${row.fungibleLimit.toLocaleString()}`} icon={<Icon name="Activity" />} />
                                                            <DataRow label="Delinquency Count" value={row.dpd} icon={<Icon name="AlertCircle" />} isDanger={row.dpd > 0} />
                                                            <DataRow 
                                                                label="Active DPD" 
                                                                value={row.dpd > 0 ? "YES" : "NO"} 
                                                                icon={<Icon name="ShieldAlert" />} 
                                                                isDanger={row.dpd > 0} 
                                                                isSuccess={row.dpd === 0} 
                                                            />
                                                        </div>
                                                    </motion.div>
                                                );
                                            })
                                        ) : (
                                            <div className="py-20 text-center opacity-30 border-2 border-dashed border-white/5 rounded-3xl">
                                                <div className="flex justify-center mb-4"><Icon name="Search" size={40} className="text-slate-500" /></div>
                                                <p className="text-[10px] font-black tracking-[0.4em] uppercase text-slate-400">Waiting for Query Parameters</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <footer className="mt-auto py-8 text-center relative z-10 pointer-events-none">
                        <div className="flex justify-center gap-6 items-center h-5 opacity-40 grayscale hover:grayscale-0 transition-all">
                            <img src="image_7fa731.png" className="h-full" />
                            <div className="w-px h-full bg-white/20"></div>
                            <img src="ninjacart.png" className="h-3/4 invert brightness-200" />
                        </div>
                        <p className="mt-4 text-[8px] font-black text-slate-500 tracking-[0.5em] uppercase">Encryption Active // Ninjacart Fin-Terminal v2.1</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
